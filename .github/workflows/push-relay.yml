name: Push Relay

on:
  push:
    branches: [main]
    paths:
      - 'server/cmd/push-relay/**'
      - 'server/go.mod'
      - 'server/go.sum'
  pull_request:
    paths:
      - 'server/cmd/push-relay/**'
      - 'server/go.mod'
      - 'server/go.sum'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.5'
          cache-dependency-path: server/go.sum

      - name: Run tests
        working-directory: server
        run: go test ./cmd/push-relay/...

      - name: Build binary
        working-directory: server
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o bin/push-relay ./cmd/push-relay/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: push-relay-linux-amd64
          path: server/bin/push-relay
